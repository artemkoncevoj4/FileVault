services:
  filevault:
    build: .
    container_name: filevault_api
    expose:
      - "8080" # Внутренний порт для Caddy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JWT_KEY=${JWT_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
    volumes:
      - ./Storage:/app/Storage
      - ./database.db:/app/database.db
    restart: always

  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    ports:
      - "8443:8443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  caddy_data:
  caddy_config: