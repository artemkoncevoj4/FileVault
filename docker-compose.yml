services:
  filevault:
    build: .
    container_name: filevault_api
    ports:
      - "80:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JWT_KEY=VashSuperSekretniyKlyuchDlyaJWT1234567890
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=твой_пароль_здесь
    volumes:
      - ./Storage:/app/Storage
      - ./database.db:/app/database.db
    restart: always