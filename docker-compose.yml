services:
  filevault:
    build: .
    container_name: filevault_api
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - JWT_KEY=VashSuperSekretniyKlyuchDlyaJWT1234567890
      - ADMIN_USERNAME=
      - ADMIN_PASSWORD=
    volumes:
      - ./Storage:/app/Storage
      - ./database.db:/app/database.db
    restart: always

  caddy:
    image: caddy:latest
    container_name: caddy_proxy
    ports:
      - "8443:8443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  caddy_data:
  caddy_config: