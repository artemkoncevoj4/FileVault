<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileVault - Облако</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>☁️ FileVault Storage</h1>

    <div id="auth-panel" class="panel">
        <h2>Вход в систему</h2>
        <input type="text" id="loginInput" placeholder="Ваш логин">
        <input type="password" id="passwordInput" placeholder="Пароль">
        <button onclick="login()">Войти</button>
        <button onclick="register()" class="btn-success">Создать аккаунт</button>
    </div>

    <div id="profile-panel" class="panel hidden">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 id="welcomeText">Привет!</h2>
            <button onclick="logout()" class="btn-danger">Выйти</button>
        </div>
        <p>Ваш уровень доступа: <b id="userLevel"></b></p>
    </div>

    <div id="files-panel" class="panel hidden">
        <h2>📂 Мои файлы</h2>
        <div id="upload-section" class="hidden">
            <p style="color: green;">✓ Вам доступна загрузка файлов (уровень 3+)</p>
            <div id="progress-container" class="hidden" style="margin-top: 10px; background: #eee; border-radius: 5px; overflow: hidden;">
            <div id="progress-bar" style="width: 0%; height: 10px; background: #28a745; transition: width 0.2s;"></div>
            </div>
            <small id="progress-text" class="hidden">0%</small>
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Загрузить на сервер</button>
        </div>
        <hr>
        <div id="file-list"><p>Загрузка списка файлов...</p></div>
    </div>

    <div id="admin-panel" class="panel hidden" style="border: 2px solid #ffc107;">
        <h2>👑 Админ-центр</h2>
        <table>
            <thead><tr><th>ID</th><th>Логин</th><th>Уровень</th><th>Действие</th></tr></thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>
</div>

<div id="rename-modal" class="panel hidden" style="position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; border: 2px solid #17a2b8; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; max-width: 90%;">
    <h3>✏️ Переименовать файл</h3>
    <p style="color: gray; font-size: 14px; word-break: break-all;">Старое имя: <b id="renameOldNameDisplay"></b></p>
    <input type="text" id="renameInput" placeholder="Новое имя">
    <div style="text-align: right;">
        <button onclick="closeRenameModal()" style="background: #6c757d;">Отмена</button>
        <button onclick="confirmRename()" class="btn-success">Сохранить</button>
    </div>
</div>

<div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000;"></div>

<script src="script.js"></script>
</body>
</html>
