<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileVault - Cloud Storage</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="main-header">
        <div class="header-content">
            <h1>☁️ FileVault Storage</h1>
            <span class="author-tag">by artemkoncevoj4</span>
        </div>
    </header>

    <main class="container">
        
        <div id="auth-panel" class="panel auth-card">
            <h2>Sign In</h2>
            <input type="text" id="loginInput" placeholder="Username">
            <input type="password" id="passwordInput" placeholder="Password">
            <div class="auth-buttons">
                <button onclick="login()">Login</button>
                <button onclick="register()" class="btn-success">Create Account</button>
            </div>
        </div>

        <div id="profile-panel" class="panel hidden">
            <div class="panel-header">
                <h2 id="welcomeText">Welcome!</h2>
                <button onclick="logout()" class="btn-danger">Logout</button>
            </div>
            <p>Access Level: <b id="userLevel"></b></p>
        </div>

        <div id="files-panel" class="panel hidden">
            <h2>📂 My Files</h2>
            
            <div id="upload-section" class="upload-zone hidden">
                <p class="success-text">✓ File upload available (Level 3+)</p>
                
                <div class="mobile-input-container">
                    <input type="file" id="fileInput" name="files" accept="*/*" multiple>
                    
                    <label class="file-label">
                        <span class="file-icon">📁</span> 
                        <span class="file-text">Click here to select files</span>
                    </label>
                </div>

                <div id="fileNameDisplay" class="file-name-hint">No file selected</div>
                
                <button onclick="uploadFile()" class="upload-btn">Upload to Server</button>
                
                <div id="progress-container" class="progress-wrapper hidden">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <small id="progress-text" class="hidden text-center">0%</small>
            </div>
            
            <hr class="divider">
            <div id="file-list"><p>Loading file list...</p></div>
        </div>

        <div id="admin-panel" class="panel admin-card hidden">
            <h2>👑 Admin Center</h2>
            <div class="table-responsive">
                <table>
                    <thead><tr><th>ID</th><th>Username</th><th>Level</th><th>Action</th></tr></thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>

        <footer class="main-footer">
            <p>© 2026 Created by <b>artemkoncevoj4</b></p>
            <div class="footer-links">
                <a href="#" onclick="showTerms()">Terms of Service</a> | 
                <a href="#" onclick="showPrivacy()">Privacy Policy</a>
            </div>
        </footer>

    </main>

    <div id="legal-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h2 id="legal-title" class="modal-title"></h2>
            <div id="legal-content" class="modal-text"></div>
            <div class="modal-actions">
                <button onclick="document.getElementById('legal-modal').classList.add('hidden')">I Understand</button>
            </div>
        </div>
    </div>

    <div id="rename-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 class="modal-title">✏️ Rename</h3>
            <p class="modal-subtitle">Current name: <b id="renameOldNameDisplay"></b></p>
            <input type="text" id="renameInput" placeholder="New name">
            <div class="modal-actions dual-buttons">
                <button onclick="closeRenameModal()" class="btn-secondary">Cancel</button>
                <button onclick="confirmRename()" class="btn-success">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
